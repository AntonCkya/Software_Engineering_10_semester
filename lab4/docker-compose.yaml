version: '3.8'

services:
  mongo:
    image: mongo:7.0
    container_name: mongo_db
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: password
      MONGO_INITDB_DATABASE: delivery
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
      - ./mongo-init.js:/docker-entrypoint-initdb.d/mongo-init.js:ro
    networks:
      - delivery_net
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: ./
    container_name: app
    command: python main.py
    ports:
      - "8000:8000"
    environment:
      MONGODB_HOST: mongo
      MONGODB_PORT: 27017
      MONGODB_DB: delivery
      MONGODB_USER: root
      MONGODB_PASSWORD: password
      MONGODB_AUTH_SOURCE: admin
    depends_on:
      mongo:
        condition: service_healthy
    networks:
      - delivery_net

volumes:
  mongo_data:

networks:
  delivery_net:
    driver: bridge
